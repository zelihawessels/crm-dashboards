<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Dashboards | Thrive</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: Arial, sans-serif;
      background: #FAF3F0;
      color: #333;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    h1 {
      font-size: 32px;
      color: #3D6B65;
      margin-bottom: 12px;
      border-bottom: 2px solid #3D6B65;
      padding-bottom: 16px;
    }
    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 40px;
    }
    .dashboards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }
    .dashboard-card {
      background: #fff;
      border: 1px solid #ddd;
      border-left: 4px solid #3D6B65;
      padding: 24px;
      border-radius: 3px;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s;
      cursor: pointer;
    }
    .dashboard-card:hover {
      box-shadow: 0 4px 8px rgba(61, 107, 101, 0.1);
      border-left-color: #2a4d49;
      transform: translateY(-2px);
    }
    .dashboard-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }
    .dashboard-title {
      font-size: 18px;
      font-weight: bold;
      color: #3D6B65;
      margin-bottom: 8px;
    }
    .dashboard-desc {
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }
    .footer {
      text-align: center;
      margin-top: 60px;
      padding-top: 20px;
      border-top: 1px solid #ddd;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📊 CRM Channel Dashboards</h1>
 
  
  <div class="dashboards-grid">
    <a href="email/" class="dashboard-card">
      <div class="dashboard-icon">📧</div>
      <div class="dashboard-title">Email Insights</div>
      <div class="dashboard-desc">Monthly email campaign performance, open rates, click-through rates, and revenue attribution.</div>
    </a>
    
    <a href="push/" class="dashboard-card">
      <div class="dashboard-icon">📤</div>
      <div class="dashboard-title">Push Notifications</div>
      <div class="dashboard-desc">Push campaign performance, open rates, and revenue attribution.</div>
    </a>
  </div>
  
  <div class="footer">
    <p>Last updated: May 2026 | CRM Ops</p>
  </div>
</div>
</body>
</html>
